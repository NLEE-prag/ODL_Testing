trigger: none
 
pool:
  vmImage: 'ubuntu-latest'
 
stages:
- stage: DeployProd
  displayName: Deploy to Prod
  jobs:
  - job: Execute
    steps:
 
    - checkout: self
 
    - task: AzureCLI@2
      displayName: "Run Python Script with Azure Login"
      inputs:
        azureSubscription: 'fabric'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Using Python $(python --version)"
 
          # Install Python and dependencies
          python3 -m pip install --upgrade pip
 
          pip install fabric-cicd
          # If your script requires dependencies, ensure a requirements.txt exists
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
 
          echo "Running Python script..."
          python3 fabric.py
